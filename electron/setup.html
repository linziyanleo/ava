<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ava Setup</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #111318;
      --panel: #181b22;
      --muted: #9ca3af;
      --text: #f4f4f5;
      --border: #2b303b;
      --accent: #2f80ed;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 32px;
    }
    section {
      width: min(760px, 100%);
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      padding: 24px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }
    p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .status {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      font-size: 13px;
    }
    .label { color: var(--muted); }
    .value {
      min-width: 0;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .error {
      color: #fecaca;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    button {
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 13px;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }
    button.danger {
      border-color: color-mix(in srgb, var(--danger) 55%, transparent);
      color: #fecaca;
    }
    pre {
      max-height: 220px;
      overflow: auto;
      margin: 18px 0 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0d0f14;
      padding: 12px;
      color: #d4d4d8;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>Ava Setup</h1>
      <p id="message">Preparing Ava desktop runtime</p>

      <div class="status">
        <div class="row">
          <div class="label">Stage</div>
          <div class="value" id="stage">starting</div>
        </div>
        <div class="row">
          <div class="label">Console</div>
          <div class="value" id="endpoint">-</div>
        </div>
        <div class="row">
          <div class="label">Nanobot</div>
          <div class="value" id="nanobot">-</div>
        </div>
        <div class="row">
          <div class="label">Logs</div>
          <div class="value" id="logs">-</div>
        </div>
        <div class="row error" id="errorRow" hidden>
          <div class="label">Error</div>
          <div class="value" id="error"></div>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="pickNanobot">Select Nanobot</button>
        <button id="retry">Retry</button>
        <button class="danger" id="cancel">Cancel</button>
        <button id="openLogs">Open Logs</button>
      </div>

      <pre id="tail" hidden></pre>
    </section>
  </main>

  <script>
    const stage = document.getElementById('stage');
    const message = document.getElementById('message');
    const endpoint = document.getElementById('endpoint');
    const nanobot = document.getElementById('nanobot');
    const logs = document.getElementById('logs');
    const errorRow = document.getElementById('errorRow');
    const error = document.getElementById('error');
    const tail = document.getElementById('tail');

    function renderState(state) {
      stage.textContent = state.stage || 'starting';
      message.textContent = state.message || '';
      endpoint.textContent = state.coreEndpoint || '-';
      nanobot.textContent = state.nanobotRoot || '-';
      logs.textContent = state.logDir || '-';
      error.textContent = state.error || '';
      errorRow.hidden = !state.error;
      tail.textContent = state.stderrTail || '';
      tail.hidden = !state.stderrTail;
    }

    window.avaDesktop?.onBootstrapState(renderState);
    window.avaDesktop?.readDesktopConfig().then((config) => {
      if (config?.nanobotRoot) {
        nanobot.textContent = config.nanobotRoot;
      }
    }).catch(() => {});

    document.getElementById('pickNanobot').addEventListener('click', async () => {
      const selected = await window.avaDesktop.selectDirectory();
      if (!selected) return;
      const result = await window.avaDesktop.setNanobotRoot(selected);
      if (!result.ok) {
        renderState({ stage: 'nanobot', message: 'Nanobot checkout is invalid', error: result.error, nanobotRoot: selected });
        return;
      }
      await window.avaDesktop.retryCore();
    });
    document.getElementById('retry').addEventListener('click', () => window.avaDesktop.retryCore());
    document.getElementById('cancel').addEventListener('click', () => window.avaDesktop.cancelBootstrap());
    document.getElementById('openLogs').addEventListener('click', () => window.avaDesktop.openLogs());
  </script>
</body>
</html>
